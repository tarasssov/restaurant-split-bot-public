name: Bug report
description: Report a reproducible problem in the bot, parser, OCR flow, or docs.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug clearly and briefly.
      placeholder: The parser drops one item when...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reproducible flow.
      placeholder: |
        1. Run ...
        2. Send ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: The bot should...
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Environment and context
      description: Python version, OS, polling/webhook mode, OCR provider, and anything relevant.

  - type: textarea
    id: data
    attributes:
      label: Sample data
      description: Use sanitized text only. Do not attach real receipts, secrets, or personal payment data.
      placeholder: Sanitized OCR text or synthetic fixture snippet
