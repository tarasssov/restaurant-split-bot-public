name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  parser-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Sanity checks for tracked secrets/artifacts
        run: |
          if git ls-files | grep -E '(^|/)\.env$|vision-ocr-bot-key\.json|^logs/|^\.venv/|(^|/)AGENTS\.md$|^memory/' >/dev/null; then
            echo "Sensitive/local artifacts are tracked in git."
            exit 1
          fi
          echo "Tracked files look safe."

      - name: Run unit tests
        run: |
          python -m unittest discover -s tests -q

      - name: Run parser regression tests
        run: |
          python test_parser.py
