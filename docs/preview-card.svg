  <path d="M133 133H171V147H133V133ZM121 163H183V177H121V163ZM141 193H163V207H141V193Z" fill="white"/>

  <text x="240" y="142" fill="white" font-family="Arial, sans-serif" font-size="56" font-weight="700">restaurant-split-bot</text>
  <text x="240" y="192" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="26">
    Split restaurant bills from receipt photos and calculate who owes whom
  </text>

  <rect x="96" y="268" width="250" height="160" rx="22" fill="#111827" stroke="#334155"/>
  <text x="128" y="320" fill="#A7F3D0" font-family="Arial, sans-serif" font-size="22" font-weight="700">1. Receipt photo</text>
  <text x="128" y="360" fill="#E5E7EB" font-family="Arial, sans-serif" font-size="20">Someone pays the bill</text>
  <text x="128" y="390" fill="#E5E7EB" font-family="Arial, sans-serif" font-size="20">and sends a check photo</text>

  <rect x="378" y="268" width="250" height="160" rx="22" fill="#111827" stroke="#334155"/>
  <text x="410" y="320" fill="#93C5FD" font-family="Arial, sans-serif" font-size="22" font-weight="700">2. OCR + parser</text>
  <text x="410" y="360" fill="#E5E7EB" font-family="Arial, sans-serif" font-size="20">The bot extracts items,</text>
  <text x="410" y="390" fill="#E5E7EB" font-family="Arial, sans-serif" font-size="20">totals and structure</text>

  <rect x="660" y="268" width="250" height="160" rx="22" fill="#111827" stroke="#334155"/>
  <text x="692" y="320" fill="#FDE68A" font-family="Arial, sans-serif" font-size="22" font-weight="700">3. Group answers</text>
  <text x="692" y="360" fill="#E5E7EB" font-family="Arial, sans-serif" font-size="20">Who ate what?</text>
  <text x="692" y="390" fill="#E5E7EB" font-family="Arial, sans-serif" font-size="20">Who already paid?</text>

  <rect x="942" y="268" width="242" height="160" rx="22" fill="#111827" stroke="#334155"/>
  <text x="974" y="320" fill="#F9A8D4" font-family="Arial, sans-serif" font-size="22" font-weight="700">4. Final settlement</text>
  <text x="974" y="360" fill="#E5E7EB" font-family="Arial, sans-serif" font-size="20">The bot calculates</text>
  <text x="974" y="390" fill="#E5E7EB" font-family="Arial, sans-serif" font-size="20">who owes whom</text>

  <path d="M346 348H378" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
  <path d="M628 348H660" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
